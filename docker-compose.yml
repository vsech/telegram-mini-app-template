services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-telegram_app}
      POSTGRES_USER: ${POSTGRES_USER:-telegram_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-telegram_app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-telegram_app} -d ${POSTGRES_DB:-telegram_app}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-80}:80"

  # Optional: Automatic SSL with Caddy
  # Use this for "clean server" full deployment.
  # 1. Set DOMAIN_NAME and ACME_EMAIL in .env
  # 2. Comment out the 'ports' section in 'frontend' service above
  # 3. Uncomment the 'caddy' service below
  # caddy:
  #   image: caddy:2-alpine
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   environment:
  #     DOMAIN_NAME: ${DOMAIN_NAME}
  #     ACME_EMAIL: ${ACME_EMAIL}
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile
  #     - caddy_data:/data
  #     - caddy_config:/config
  #   depends_on:
  #     - frontend

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
